services:
  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ocr-network

  db:
    image: postgres:16-alpine
    container_name: ocr-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ocr_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocr_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ocr-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/tests:/app/tests:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - ocr-network
    command: ["python", "-m", "uvicorn", "ocr_platform.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-worker
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - ocr-network
    command: ["celery", "-A", "ocr_platform.jobs.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  # Frontend (React) Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - ocr-network

volumes:
  redis_data:
  postgres_data:

networks:
  ocr-network:
    driver: bridge
